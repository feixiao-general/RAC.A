<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="utf-8">
        <title>RAC.A</title>
        <style>
            .parent {
                text-align: center;
            }
            table {
                margin: 10px auto;
                border-collapse: collapse;
            }
            td {
                font-size: 30px;
                padding: 10px 20px;
            }
            h1 {
                font-size: 48px; 
            }
            h2 {
                font-size: 38px;
            }
            h3 {
                font-size: 30px;
            }

            .typewriter {
                display: inline-block;
                overflow: hidden;
                white-space: nowrap;
                animation: typing 3s steps(40) 1s forwards;
                max-width: 0;
                opacity: 0;
                animation-fill-mode: forwards;
            }

            @keyframes typing {
                0% {
                    max-width: 0;
                    opacity: 1;
                }
                100% {
                    max-width: 100%;
                    opacity: 1;
                }
            }

            .typewriter-wrapper {
                display: block;
                white-space: nowrap;
                text-align: center;  /* 新增：强制居中 */
            }
            /* 让内联的span在父容器中居中 */
            .typewriter-wrapper .typewriter {
                display: inline-block;
                /* 继承父级居中 */
            }
        </style>
    </head>
